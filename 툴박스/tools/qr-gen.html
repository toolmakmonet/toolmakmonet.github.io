<script>
let qrcodeObj = null;

function generateQR() {
  const text = document.getElementById('qrText').value;
  if(!text) { alert("URL이나 텍스트를 입력해주세요."); return; }
  
  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = ""; // 초기화
  
  qrcodeObj = new QRCode(qrDiv, {
    text: text,
    width: 256,
    height: 256,
    colorDark : "#000000",
    colorLight : "#ffffff",
    correctLevel : QRCode.CorrectLevel.H
  });
  
  const res = document.getElementById('qrResult');
  res.style.display = 'block';
  res.classList.add('scroll-reveal');
  setTimeout(()=>res.classList.add('visible'), 50);
}

function downloadQR() {
  const img = document.querySelector('#qrcode img');
  if(!img || !img.src) {
    // 간혹 img 렌더링 전 canvas만 있는 경우 대비
    const canvas = document.querySelector('#qrcode canvas');
    if(canvas) {
      const link = document.createElement('a');
      link.href = canvas.toDataURL("image/png");
      link.download = 'qrcode.png';
      link.click();
    }
    return;
  }
  const link = document.createElement('a');
  link.href = img.src;
  link.download = 'qrcode.png';
  link.click();
}
</script>
