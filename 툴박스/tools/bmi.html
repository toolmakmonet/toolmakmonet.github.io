<script>
const tt = document.getElementById('themeToggle');
if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light'); tt.textContent = '☀️'; }
tt.addEventListener('click', () => {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  tt.textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
});

// Gender UI
document.querySelectorAll('input[name="gender"]').forEach(radio => {
  radio.addEventListener('change', () => {
    const male = document.getElementById('maleBtn');
    const female = document.getElementById('femaleBtn');
    if (radio.value === 'male') {
      male.style.borderColor = 'var(--primary)';
      male.style.background = 'rgba(99,102,241,0.1)';
      female.style.borderColor = 'var(--border)';
      female.style.background = 'transparent';
    } else {
      female.style.borderColor = 'var(--secondary)';
      female.style.background = 'rgba(236,72,153,0.1)';
      male.style.borderColor = 'var(--border)';
      male.style.background = 'transparent';
    }
  });
});

function calcBMI() {
  const h = parseFloat(document.getElementById('height').value);
  const w = parseFloat(document.getElementById('weight').value);
  if (!h || !w || h < 100 || w < 10) {
    alert('키와 몸무게를 올바르게 입력해주세요.');
    return;
  }
  const hm = h / 100;
  const bmi = w / (hm * hm);
  const bmiRound = Math.round(bmi * 10) / 10;

  let category, color, pointerPct;
  if (bmi < 18.5) {
    category = '저체중 🔵'; color = '#3b82f6'; pointerPct = (bmi / 18.5) * 25;
  } else if (bmi < 23) {
    category = '정상 ✅'; color = '#22c55e'; pointerPct = 25 + ((bmi - 18.5) / 4.5) * 25;
  } else if (bmi < 25) {
    category = '과체중 ⚠️'; color = '#eab308'; pointerPct = 50 + ((bmi - 23) / 2) * 20;
  } else if (bmi < 30) {
    category = '비만 1단계 🔴'; color = '#f97316'; pointerPct = 70 + ((bmi - 25) / 5) * 20;
  } else {
    category = '비만 2단계 🔴'; color = '#ef4444'; pointerPct = 90 + Math.min((bmi - 30) / 10, 1) * 10;
  }

  const idealMin = Math.round(18.5 * hm * hm * 10) / 10;
  const idealMax = Math.round(23 * hm * hm * 10) / 10;
  const idealMid = Math.round((idealMin + idealMax) / 2 * 10) / 10;
  const diff = Math.round((w - idealMid) * 10) / 10;

  document.getElementById('bmiValue').textContent = bmiRound;
  const cat = document.getElementById('bmiCategory');
  cat.textContent = category;
  cat.style.background = color + '22';
  cat.style.color = color;
  cat.style.border = `2px solid ${color}44`;
  document.getElementById('bmiPointer').style.left = `calc(${Math.min(Math.max(pointerPct, 2), 97)}% - 2px)`;
  document.getElementById('idealWeight').textContent = idealMid;
  document.getElementById('weightDiff').textContent = (diff > 0 ? '+' : '') + diff;
  document.getElementById('weightDiff').style.color = diff > 2 ? '#ef4444' : diff < -2 ? '#3b82f6' : '#22c55e';
  document.getElementById('idealRange').textContent = `${idealMin}kg ~ ${idealMax}kg`;

  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
