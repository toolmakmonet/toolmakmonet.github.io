<script>
const tt = document.getElementById('themeToggle');
if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light'); tt.textContent = '☀️'; }
tt.addEventListener('click', () => {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  tt.textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
});

const UNITS = {
  length: {
    name: '길이',
    units: [
      { label:'킬로미터 (km)', key:'km', toBase: v => v * 1000, fromBase: v => v / 1000 },
      { label:'미터 (m)', key:'m', toBase: v => v, fromBase: v => v },
      { label:'센티미터 (cm)', key:'cm', toBase: v => v / 100, fromBase: v => v * 100 },
      { label:'밀리미터 (mm)', key:'mm', toBase: v => v / 1000, fromBase: v => v * 1000 },
      { label:'마일 (mi)', key:'mi', toBase: v => v * 1609.344, fromBase: v => v / 1609.344 },
      { label:'야드 (yd)', key:'yd', toBase: v => v * 0.9144, fromBase: v => v / 0.9144 },
      { label:'피트 (ft)', key:'ft', toBase: v => v * 0.3048, fromBase: v => v / 0.3048 },
      { label:'인치 (in)', key:'in', toBase: v => v * 0.0254, fromBase: v => v / 0.0254 },
      { label:'해리 (nm)', key:'nm', toBase: v => v * 1852, fromBase: v => v / 1852 },
    ]
  },
  weight: {
    name: '무게',
    units: [
      { label:'킬로그램 (kg)', key:'kg', toBase: v => v, fromBase: v => v },
      { label:'그램 (g)', key:'g', toBase: v => v / 1000, fromBase: v => v * 1000 },
      { label:'밀리그램 (mg)', key:'mg', toBase: v => v / 1e6, fromBase: v => v * 1e6 },
      { label:'파운드 (lb)', key:'lb', toBase: v => v * 0.453592, fromBase: v => v / 0.453592 },
      { label:'온스 (oz)', key:'oz', toBase: v => v * 0.0283495, fromBase: v => v / 0.0283495 },
      { label:'돈 (don)', key:'don', toBase: v => v * 0.00375, fromBase: v => v / 0.00375 },
      { label:'근 (geun)', key:'geun', toBase: v => v * 0.6, fromBase: v => v / 0.6 },
      { label:'톤 (t)', key:'t', toBase: v => v * 1000, fromBase: v => v / 1000 },
    ]
  },
  temp: {
    name: '온도',
    units: [
      { label:'섭씨 (°C)', key:'c' },
      { label:'화씨 (°F)', key:'f' },
      { label:'켈빈 (K)', key:'k' },
    ]
  },
  area: {
    name: '넓이',
    units: [
      { label:'제곱미터 (m²)', key:'m2', toBase: v => v, fromBase: v => v },
      { label:'제곱킬로미터 (km²)', key:'km2', toBase: v => v * 1e6, fromBase: v => v / 1e6 },
      { label:'제곱센티미터 (cm²)', key:'cm2', toBase: v => v / 10000, fromBase: v => v * 10000 },
      { label:'헥타르 (ha)', key:'ha', toBase: v => v * 10000, fromBase: v => v / 10000 },
      { label:'에이커 (acre)', key:'acre', toBase: v => v * 4046.86, fromBase: v => v / 4046.86 },
      { label:'평 (pyeong)', key:'pyeong', toBase: v => v * 3.30579, fromBase: v => v / 3.30579 },
    ]
  },
  volume: {
    name: '부피',
    units: [
      { label:'리터 (L)', key:'l', toBase: v => v, fromBase: v => v },
      { label:'밀리리터 (mL)', key:'ml', toBase: v => v / 1000, fromBase: v => v * 1000 },
      { label:'세제곱미터 (m³)', key:'m3', toBase: v => v * 1000, fromBase: v => v / 1000 },
      { label:'갤런 미국 (gal)', key:'gal', toBase: v => v * 3.78541, fromBase: v => v / 3.78541 },
      { label:'컵 (cup)', key:'cup', toBase: v => v * 0.236588, fromBase: v => v / 0.236588 },
      { label:'테이블스푼 (tbsp)', key:'tbsp', toBase: v => v * 0.0147868, fromBase: v => v / 0.0147868 },
    ]
  },
  speed: {
    name: '속도',
    units: [
      { label:'km/h', key:'kmh', toBase: v => v, fromBase: v => v },
      { label:'m/s', key:'ms', toBase: v => v * 3.6, fromBase: v => v / 3.6 },
      { label:'mph', key:'mph', toBase: v => v * 1.60934, fromBase: v => v / 1.60934 },
      { label:'노트 (knot)', key:'knot', toBase: v => v * 1.852, fromBase: v => v / 1.852 },
      { label:'마하 (Mach)', key:'mach', toBase: v => v * 1234.8, fromBase: v => v / 1234.8 },
    ]
  }
};

let currentCategory = 'length';

function setCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  populateSelects();
  convert();
}

function populateSelects() {
  const data = UNITS[currentCategory];
  const from = document.getElementById('fromUnit');
  const to = document.getElementById('toUnit');
  from.innerHTML = data.units.map((u,i) => `<option value="${u.key}">${u.label}</option>`).join('');
  to.innerHTML = data.units.map((u,i) => `<option value="${u.key}" ${i===1?'selected':''}>${u.label}</option>`).join('');
}

function convertTemp(val, from, to) {
  let celsius;
  if (from === 'c') celsius = val;
  else if (from === 'f') celsius = (val - 32) * 5/9;
  else celsius = val - 273.15;
  if (to === 'c') return celsius;
  if (to === 'f') return celsius * 9/5 + 32;
  return celsius + 273.15;
}

function formatNum(n) {
  if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(4) + 'B';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(4) + 'M';
  if (Math.abs(n) === 0) return '0';
  if (Math.abs(n) < 0.0001) return n.toExponential(4);
  return parseFloat(n.toPrecision(7)).toLocaleString('ko-KR');
}

function convert() {
  const val = parseFloat(document.getElementById('inputVal').value);
  if (isNaN(val)) return;
  const fromKey = document.getElementById('fromUnit').value;
  const toKey = document.getElementById('toUnit').value;
  const data = UNITS[currentCategory];

  let result;
  if (currentCategory === 'temp') {
    result = convertTemp(val, fromKey, toKey);
  } else {
    const fromUnit = data.units.find(u => u.key === fromKey);
    const toUnit = data.units.find(u => u.key === toKey);
    const base = fromUnit.toBase(val);
    result = toUnit.fromBase(base);
  }

  const toLabel = data.units.find(u => u.key === toKey)?.label || toKey;
  document.getElementById('mainResult').textContent = formatNum(result);
  document.getElementById('mainUnit').textContent = toLabel;

  // All conversions
  if (currentCategory !== 'temp') {
    const fromUnit = data.units.find(u => u.key === fromKey);
    const base = fromUnit.toBase(val);
    const grid = document.getElementById('allConvGrid');
    grid.innerHTML = data.units.map(u => `
      <div class="conv-item">
        <span class="unit">${u.label.split(' ')[0]}</span>
        <span class="val">${formatNum(u.fromBase(base))}</span>
      </div>`).join('');
    document.getElementById('allConversions').style.display = 'block';
  } else {
    document.getElementById('allConversions').style.display = 'none';
  }
}

function swapUnits() {
  const from = document.getElementById('fromUnit');
  const to = document.getElementById('toUnit');
  const tmp = from.value;
  from.value = to.value;
  to.value = tmp;
  convert();
}

// Init
populateSelects();
convert();
</script>
