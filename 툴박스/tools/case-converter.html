<script>
const input = document.getElementById('inputText');

function convert(type) {
  let text = input.value;
  if(!text) return;
  
  if(type === 'upper') {
    text = text.toUpperCase();
  } else if(type === 'lower') {
    text = text.toLowerCase();
  } else if(type === 'sentence') {
    text = text.toLowerCase().replace(/(^\s*\w|[\.\!\?]\s*\w)/g, c => c.toUpperCase());
  } else if(type === 'title') {
    text = text.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
  } else if(type === 'camel') {
    text = text.replace(/(?:^\w|[A-Z]|\b\w|\s+)/g, (match, index) => {
      if (+match === 0) return "";
      return index === 0 ? match.toLowerCase() : match.toUpperCase();
    });
  } else if(type === 'snake') {
    text = text.replace(/\W+/g, " ").split(/ |\B(?=[A-Z])/).map(w => w.toLowerCase()).join('_');
  }
  
  input.value = text;
}

function copyText() {
  if(!input.value) return;
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 복사 완료!';
    setTimeout(() => btn.textContent = '📋 결과 복사하기', 2000);
  });
}

function clearText() {
  input.value = '';
}
</script>
