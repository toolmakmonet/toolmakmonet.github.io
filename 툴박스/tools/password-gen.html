<script>
const tt = document.getElementById('themeToggle');
if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light'); tt.textContent = '☀️'; }
tt.addEventListener('click', () => {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  tt.textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
});

function updateLength() {
  document.getElementById('lengthBadge').textContent = document.getElementById('lengthSlider').value;
}

function buildCharset() {
  const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const lower = 'abcdefghijklmnopqrstuvwxyz';
  const nums = '0123456789';
  const syms = '!@#$%^&*()-_=+[]{}|;:,.<>?';
  const exclude = document.getElementById('excludeChars').value;
  let charset = '';
  if (document.getElementById('useUpper').checked) charset += upper;
  if (document.getElementById('useLower').checked) charset += lower;
  if (document.getElementById('useNumbers').checked) charset += nums;
  if (document.getElementById('useSymbols').checked) charset += syms;
  return charset.split('').filter(c => !exclude.includes(c)).join('');
}

function generatePw() {
  const charset = buildCharset();
  if (!charset) { alert('최소 하나의 문자 유형을 선택해주세요.'); return ''; }
  const length = parseInt(document.getElementById('lengthSlider').value);
  const array = new Uint8Array(length);
  crypto.getRandomValues(array);
  return Array.from(array).map(b => charset[b % charset.length]).join('');
}

function getStrength(pw) {
  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (pw.length >= 16) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[a-z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  if (score <= 2) return { label:'매우 약함 ❌', pct:15, color:'#ef4444' };
  if (score <= 3) return { label:'약함 ⚠️', pct:35, color:'#f97316' };
  if (score <= 4) return { label:'보통 😐', pct:55, color:'#eab308' };
  if (score <= 5) return { label:'강함 ✅', pct:75, color:'#22c55e' };
  return { label:'매우 강함 🔒', pct:100, color:'#10b981' };
}

function generate() {
  const pw = generatePw();
  if (!pw) return;
  document.getElementById('generatedPw').textContent = pw;
  const s = getStrength(pw);
  document.getElementById('strengthBar').style.width = s.pct + '%';
  document.getElementById('strengthBar').style.background = s.color;
  document.getElementById('strengthLabel').textContent = s.label;
  document.getElementById('strengthLabel').style.color = s.color;
  document.getElementById('multiList').style.display = 'none';
}

function generateMultiple() {
  const pws = Array.from({length:5}, generatePw).filter(Boolean);
  if (!pws.length) return;
  const list = document.getElementById('pwList');
  list.innerHTML = pws.map(pw => `
    <div class="pw-item" onclick="navigator.clipboard.writeText('${pw}');this.style.borderColor='var(--success)';setTimeout(()=>this.style.borderColor='var(--border)',1500)" title="클릭하여 복사" style="cursor:pointer">
      <span style="font-family:monospace;color:var(--primary-light)">${pw}</span>
      <span style="font-size:0.75rem;color:var(--text-muted)">복사</span>
    </div>`).join('');
  document.getElementById('multiList').style.display = 'block';
  generate();
}

function copyPw() {
  const pw = document.getElementById('generatedPw').textContent;
  if (pw === '버튼을 눌러 생성하세요') return;
  navigator.clipboard.writeText(pw).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 복사됨!';
    setTimeout(() => btn.textContent = '복사', 2000);
  });
}

// Auto generate on load
generate();
</script>
